# /etc/nginx/sites-available/berzakatalizatora.com
# 
# INSTALACIJA:
# cp nginx-berzakatalizatora.conf /etc/nginx/sites-available/berzakatalizatora.com
# ln -s /etc/nginx/sites-available/berzakatalizatora.com /etc/nginx/sites-enabled/
# nginx -t && systemctl reload nginx
# certbot --nginx -d berzakatalizatora.com -d www.berzakatalizatora.com

server {
    listen 80;
    listen [::]:80;
    server_name berzakatalizatora.com www.berzakatalizatora.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name berzakatalizatora.com www.berzakatalizatora.com;

    # SSL — certbot popunjava automatski
    # ssl_certificate /etc/letsencrypt/live/berzakatalizatora.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/berzakatalizatora.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    # API → Berza Node.js na portu 3002
    location /api/ {
        proxy_pass         http://127.0.0.1:3002/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Upload slike
    location /uploads/ {
        proxy_pass http://127.0.0.1:3002/uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Frontend SPA
    location / {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
